name: Deploy Flutter Web

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Create .env
        run: |
          cat <<EOF > .env
          ENVIRONMENT=${{ secrets.ENVIRONMENT }}
          AZURE_API_BASE_URL=${{ secrets.AZURE_API_BASE_URL }}
          AZURE_NEGOTIATE_ENDPOINT=${{ secrets.AZURE_NEGOTIATE_ENDPOINT }}
          AZURE_GENERATE_UPLOAD_URL_ENDPOINT=${{ secrets.AZURE_GENERATE_UPLOAD_URL_ENDPOINT }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --dart-define-from-file=.env

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4