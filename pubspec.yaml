name: incauca_labs
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  get_it: ^7.6.4
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  image_picker: ^1.0.4
  uuid: ^4.2.1
  path: ^1.8.3
  crypto: ^3.0.3
  flutter_launcher_icons: ^0.14.4
  mime: ^2.0.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  shared_preferences: ^2.2.2
  formz: ^0.8.0

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.3
  bloc_test: ^9.1.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/ 